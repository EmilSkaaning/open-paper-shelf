name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up uv
      uses: astral-sh/setup-uv@v2

    - name: Install dependencies
      run: uv pip install -e .[dev] # Or standard uv sync if using uv workspaces

    - name: Run tests with poe
      run: uv run poe test
